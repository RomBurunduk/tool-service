# yaml-language-server: $schema=https://spec.openapis.org/oas/3.0/schema/2021-09-28
openapi: 3.0.0
info:
  title: Tool Service
  description: Tool Service
  version: 1.0.0
servers:
  - url: 'http://localhost:8081/tools/api'



components:
  schemas:
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Текст ошибки
      example:
        error: описание причины отказа

    WordStatResult:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                description: The date
              count:
                type: integer
                description: Number of queries containing the given keyword
              share:
                type: string
                description: The share of the number of such queries from the total number of queries to Yandex.

  responses:
    ErrorBadRequest:
      description: Некорректный запрос (например, пустой или отсутствующий query)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ErrorNotFound:
      description: Устройство или цена не найдены
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ErrorInternalServerError:
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ErrorBadGateway:
      description: Ошибка при обращении к внешнему сервису или некорректный ответ upstream
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

paths:
  /region:
    get:
      summary: Регион пользователя
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  region:
                    type: string
                    example: г. Москва
        '500':
          $ref: '#/components/responses/ErrorInternalServerError'

  /wordstat:
    get:
      summary: Динамика спроса на новую и БУ модель техники
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  used:
                    $ref: '#/components/schemas/WordStatResult'
                  new:
                    $ref: '#/components/schemas/WordStatResult'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '502':
          $ref: '#/components/responses/ErrorBadGateway'

  /phone-prices:
    get:
      description: Цены устройств на релизе
      parameters:
        - name: query
          in: query
          required: true
          description: Название телефона
          example: iPhone 12 Pro
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  price:
                    type: number
                    example: 649.9
                    description: Цена телефона в долларах на релизе
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '500':
          $ref: '#/components/responses/ErrorInternalServerError'

  /currency:
    get:
      description: Курс рубля к EUR,USD,CNY
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  CNY:
                    type: number
                    example: 10.99876
                  EUR:
                    type: number
                    example: 87.90930
                  USD:
                    type: number
                    example: 75.09961
        '502':
          $ref: '#/components/responses/ErrorBadGateway'


