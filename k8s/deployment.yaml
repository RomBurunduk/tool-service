apiVersion: apps/v1
kind: Deployment
metadata:
  name: tool-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tool-service
  template:
    metadata:
      labels:
        app: tool-service
    spec:
      containers:
        - name: tool-service
          image: tool-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: HTTP_ADDR
              value: ":8081"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tool-service-secrets
                  key: database-url
            - name: WORDSTAT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tool-service-secrets
                  key: wordstat-api-key
            - name: WORDSTAT_FOLDER_ID
              valueFrom:
                secretKeyRef:
                  name: tool-service-secrets
                  key: wordstat-folder-id
            - name: CURRENCY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: tool-service-secrets
                  key: currency-api-key
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 10
